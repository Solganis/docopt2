version: 2
updates:
  # Python dependencies via uv: the native `uv` ecosystem updates pyproject.toml
  # AND keeps uv.lock in sync (the older `pip` ecosystem left the lock untouched).
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
      semver-major-days: 7
    commit-message:
      prefix: "chore(deps)"
    groups:
      # One PR/week for all minor+patch bumps; majors stay individual for review.
      python-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    commit-message:
      prefix: "ci(deps)"
    groups:
      actions-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
